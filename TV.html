<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV IPTV Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin:0; 
      background:#0a0a0a; 
      color:#eee; 
      font-family: Arial, sans-serif; 
      overflow: hidden;
    }
    .header {
      background:#1f1f1f; 
      padding:15px 20px; 
      text-align:center; 
      border-bottom:3px solid #e50914;
    }
    .playlist-input {
      display:flex; 
      max-width:900px; 
      margin:10px auto; 
      gap:10px;
    }
    .playlist-input input {
      flex:1; 
      padding:16px; 
      font-size:17px; 
      border-radius:8px; 
      border:none;
      background:#333;
      color:white;
    }
    button {
      padding:16px 28px; 
      background:#e50914; 
      color:white; 
      border:none; 
      border-radius:8px; 
      font-weight:bold; 
      cursor:pointer;
      font-size:16px;
    }
    button:hover { background:#f40612; }

    .main-container {
      display: flex;
      height: calc(100vh - 110px);
    }

    /* Kategoriler Paneli (Yan) */
    .categories-panel {
      width: 280px;
      background: #1a1a1a;
      overflow-y: auto;
      border-right: 2px solid #333;
      padding: 15px 0;
    }
    .cat-item {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 16px;
      border-left: 4px solid transparent;
    }
    .cat-item:hover {
      background: #292929;
    }
    .cat-item.active {
      background: #e50914;
      border-left: 4px solid white;
      font-weight: bold;
    }

    /* Kanal Listesi Paneli */
    .channels-panel {
      width: 380px;
      background: #141414;
      overflow-y: auto;
      border-right: 1px solid #333;
      padding: 10px;
    }

    /* Player Alanı */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .now-playing {
      padding: 15px;
      background: #1f1f1f;
      text-align: center;
      font-size: 18px;
      min-height: 60px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      padding: 12px 10px;
      margin: 6px 0;
      background: #1f1f1f;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .channel-item:hover, .channel-item.focused {
      background: #e50914;
      transform: scale(1.03);
    }
    .channel-item img {
      width: 90px;
      height: 65px;
      object-fit: cover;
      margin-right: 15px;
      border-radius: 6px;
    }
    .channel-info .channel-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .channel-info .channel-group {
      font-size: 13px;
      color: #bbb;
    }

    input#search {
      width: calc(100% - 20px);
      margin: 10px auto;
      display: block;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

  <div class="header">
    <h2>📺 TV IPTV Player</h2>
    <div class="playlist-input">
      <input type="text" id="playlistUrl" placeholder="M3U linkini buraya yapıştır (kısaltılmış link de olur)">
      <button onclick="addPlaylist()">Ekle</button>
    </div>
  </div>

  <div class="main-container">
    <!-- Kategoriler Yan Panel -->
    <div class="categories-panel" id="categoriesPanel"></div>

    <!-- Kanal Listesi -->
    <div class="channels-panel">
      <input type="text" id="search" placeholder="🔍 Kanal ara..." onkeyup="filterChannels()">
      <div id="channelList"></div>
    </div>

    <!-- Player -->
    <div class="player-area">
      <video id="videoPlayer" controls autoplay></video>
      <div class="now-playing">
        <span id="nowPlaying">Kanal seçmek için kategoriye tıklayın veya kumanda ile gezin</span>
      </div>
    </div>
  </div>

  <script>
    let playlists = [];
    let currentChannels = [];
    let currentCategory = "Tümü";
    let hls = null;
    let selectedIndex = -1;

    const video = document.getElementById('videoPlayer');
    const categoriesPanel = document.getElementById('categoriesPanel');
    const channelListEl = document.getElementById('channelList');
    const nowPlaying = document.getElementById('nowPlaying');

    async function parseM3U(text) {
      const lines = text.split('\n');
      const channels = [];
      let current = {};

      for (let line of lines) {
        line = line.trim();
        if (line.startsWith('#EXTINF:')) {
          current = {};
          const logo = line.match(/tvg-logo="([^"]*)"/i);
          const group = line.match(/group-title="([^"]*)"/i);
          const name = line.match(/,(.+)$/);

          current.logo = logo ? logo[1] : '';
          current.group = group ? group[1] : 'Diğer';
          current.name = name ? name[1].trim() : 'Bilinmeyen Kanal';
        } else if (line && !line.startsWith('#') && current.name) {
          current.url = line;
          channels.push({ ...current });
          current = {};
        }
      }
      return channels;
    }

    async function addPlaylist() {
      const url = document.getElementById('playlistUrl').value.trim();
      if (!url) return alert("Lütfen bir M3U linki girin!");

      try {
        const res = await fetch(url);
        const text = await res.text();
        const channels = await parseM3U(text);

        const name = `Playlist ${playlists.length + 1}`;
        playlists.push({ name, url, channels });

        alert(`${channels.length} kanal yüklendi!`);
        loadPlaylist(playlists.length - 1);
      } catch (e) {
        alert("Playlist yüklenemedi!\nBazı kısaltılmış linklerde CORS sorunu olabilir.\n\n" + e.message);
      }
    }

    function loadPlaylist(index) {
      currentChannels = playlists[index].channels;
      currentCategory = "Tümü";
      selectedIndex = 0;
      renderCategories();
      renderChannels();
      focusChannel(0);
    }

    function renderCategories() {
      categoriesPanel.innerHTML = '';

      // "Tümü" butonu
      const all = document.createElement('div');
      all.className = `cat-item ${currentCategory === "Tümü" ? "active" : ""}`;
      all.textContent = "📺 TÜMÜ";
      all.onclick = () => {
        currentCategory = "Tümü";
        renderCategories();
        renderChannels();
      };
      categoriesPanel.appendChild(all);

      // Diğer kategoriler
      const groups = {};
      currentChannels.forEach(ch => {
        groups[ch.group] = (groups[ch.group] || 0) + 1;
      });

      Object.keys(groups).sort().forEach(group => {
        const div = document.createElement('div');
        div.className = `cat-item ${currentCategory === group ? "active" : ""}`;
        div.textContent = `${group} (${groups[group]})`;
        div.onclick = () => {
          currentCategory = group;
          renderCategories();
          renderChannels();
        };
        categoriesPanel.appendChild(div);
      });
    }

    function renderChannels() {
      channelListEl.innerHTML = '';
      const filtered = currentCategory === "Tümü" 
        ? currentChannels 
        : currentChannels.filter(ch => ch.group === currentCategory);

      filtered.forEach((channel, idx) => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `
          ${channel.logo ? 
            `<img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/90x65/333/fff?text=TV'">` : 
            `<img src="https://via.placeholder.com/90x65/333/fff?text=TV">`}
          <div class="channel-info">
            <div class="channel-name">${channel.name}</div>
            <div class="channel-group">${channel.group}</div>
          </div>
        `;
        div.onclick = () => playChannel(channel);
        channelListEl.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('search').value.toLowerCase().trim();
      if (!term) {
        renderChannels();
        return;
      }

      channelListEl.innerHTML = '';
      const filtered = currentChannels.filter(ch => 
        ch.name.toLowerCase().includes(term) || 
        ch.group.toLowerCase().includes(term)
      );

      filtered.forEach(channel => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `
          ${channel.logo ? `<img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/90x65/333/fff?text=TV'">` : `<img src="https://via.placeholder.com/90x65/333/fff?text=TV">`}
          <div class="channel-info">
            <div class="channel-name">${channel.name}</div>
            <div class="channel-group">${channel.group}</div>
          </div>
        `;
        div.onclick = () => playChannel(channel);
        channelListEl.appendChild(div);
      });
    }

    function playChannel(channel) {
      nowPlaying.textContent = `Şimdi oynuyor: ${channel.name}`;

      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (channel.url.includes('m3u8')) {
        if (Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(channel.url);
          hls.attachMedia(video);
        } else {
          video.src = channel.url;
        }
      } else {
        video.src = channel.url;
      }
      video.play().catch(() => {});
    }

    // ====================== KUMANDA DESTEĞİ ======================
    function focusChannel(index) {
      const items = channelListEl.querySelectorAll('.channel-item');
      items.forEach((item, i) => item.classList.toggle('focused', i === index));
      selectedIndex = index;
      if (items[index]) items[index].scrollIntoView({ behavior: "smooth", block: "center" });
    }

    document.addEventListener('keydown', (e) => {
      const items = channelListEl.querySelectorAll('.channel-item');
      if (items.length === 0) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        focusChannel((selectedIndex + 1) % items.length);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        focusChannel((selectedIndex - 1 + items.length) % items.length);
      } else if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (selectedIndex >= 0 && items[selectedIndex]) {
          items[selectedIndex].click();
        }
      } else if (e.key === "f" || e.key === "F") {
        if (!document.fullscreenElement) video.requestFullscreen();
        else document.exitFullscreen();
      } else if (e.key === "ArrowRight") {
        video.volume = Math.min(1, video.volume + 0.1);
      } else if (e.key === "ArrowLeft") {
        video.volume = Math.max(0, video.volume - 0.1);
      }
    });

    // Sayfa yüklendiğinde
    window.onload = () => {
      // Test için istersen buraya örnek link koy:
      // document.getElementById('playlistUrl').value = "https://example.com/playlist.m3u";
    };
  </script>
</body>
</html>
